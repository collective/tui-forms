<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bgGrad)" rx="8"/>

  <!-- Terminal window frame -->
  <!-- Top bar -->
  <rect x="4" y="4" width="56" height="10" fill="#1e1b4b" rx="2"/>
  <!-- Body -->
  <rect x="4" y="14" width="56" height="46" fill="#13103a"/>
  <!-- Border -->
  <rect x="4" y="4" width="56" height="56" fill="none" stroke="#4f46e5" stroke-width="1.5" rx="3"/>

  <!-- Traffic light dots in title bar -->
  <rect x="8" y="7" width="4" height="4" fill="#ef4444" opacity="0.85"/>
  <rect x="14" y="7" width="4" height="4" fill="#eab308" opacity="0.85"/>
  <rect x="20" y="7" width="4" height="4" fill="#22c55e" opacity="0.75"/>

  <!-- Pixel art "TF" monogram inside terminal body -->
  <!-- T - pixel art -->
  <!-- Top bar of T -->
  <rect x="10" y="20" width="18" height="4" fill="#7c3aed" filter="url(#glow)"/>
  <!-- Stem of T -->
  <rect x="17" y="24" width="4" height="14" fill="#7c3aed" filter="url(#glow)"/>

  <!-- F - pixel art -->
  <!-- Left vertical of F -->
  <rect x="34" y="20" width="4" height="18" fill="#a78bfa" filter="url(#glow)"/>
  <!-- Top horizontal of F -->
  <rect x="38" y="20" width="14" height="4" fill="#a78bfa" filter="url(#glow)"/>
  <!-- Middle horizontal of F -->
  <rect x="38" y="27" width="10" height="4" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Form field lines (bottom section) -->
  <!-- Field 1 -->
  <rect x="8" y="46" width="28" height="3" fill="#312e81"/>
  <rect x="8" y="46" width="28" height="3" fill="none" stroke="#4f46e5" stroke-width="0.5"/>
  <rect x="9" y="47" width="12" height="1" fill="#818cf8" opacity="0.7"/>
  <!-- Cursor blink -->
  <rect x="22" y="46.5" width="2" height="4" fill="#7c3aed" opacity="0.9"/>

  <!-- Field 2 -->
  <rect x="8" y="52" width="28" height="3" fill="#312e81"/>
  <rect x="8" y="52" width="28" height="3" fill="none" stroke="#4f46e5" stroke-width="0.5"/>
  <rect x="9" y="53" width="8" height="1" fill="#818cf8" opacity="0.5"/>

  <!-- Progress dots -->
  <rect x="40" y="47" width="4" height="4" fill="#7c3aed"/>
  <rect x="46" y="47" width="4" height="4" fill="#7c3aed"/>
  <rect x="52" y="47" width="4" height="4" fill="#312e81"/>

  <!-- Submit button pixel -->
  <rect x="40" y="53" width="16" height="4" fill="#4f46e5"/>
  <rect x="41" y="54" width="14" height="2" fill="#818cf8" opacity="0.5"/>
</svg>
